<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>1995年 都道府県別 地震発生回数</title>

  <link rel="stylesheet" href="../css/map1995.css">
  
</head>

<body>

  <a href="../index.html" class="back-button">← ポータルに戻る</a>

  <div class="container">
    <h2>1995年（平成7年）阪神・淡路大震災 都道府県別 地震発生回数</h2>

    <div class="description">
      1995年の地震データを、通年・月別・日付別・震度別に表示します。地図にマウスを乗せると震度別回数も確認できます。
    </div>

    <div class="control-area">
      <div class="control-group">
        <label for="date-input">日付：</label>
        <input type="date" id="date-input" min="1995-01-01" max="1995-12-31">
        <button onclick="handleDateSearch()">日付で表示</button>
      </div>

      <div class="control-group">
        <label for="month-select" class="year-label">月：</label>
        <select id="month-select" onchange="handleCategoryChange()">
          <option value="all">通年</option>
          <option value="01">1月</option>
          <option value="02">2月</option>
          <option value="03">3月</option>
          <option value="04">4月</option>
          <option value="05">5月</option>
          <option value="06">6月</option>
          <option value="07">7月</option>
          <option value="08">8月</option>
          <option value="09">9月</option>
          <option value="10">10月</option>
          <option value="11">11月</option>
          <option value="12">12月</option>
        </select>
      </div>

      <div class="control-group">
        <label for="shindo-select">震度：</label>
        <select id="shindo-select" onchange="handleCategoryChange()">
          <option value="all">すべて</option>
          <option value="shindo1">震度1</option>
          <option value="shindo2">震度2</option>
          <option value="shindo3">震度3</option>
          <option value="shindo4_above">震度4以上</option>
        </select>
      </div>

      <button onclick="resetView()">通年表示に戻す</button>
    </div>

    <div id="regions_div"></div>
    <!-- 追加：大規模地震災害の比較 -->
    <div class="disaster-comparison">
      <h3>災害の概要（リンクから出典を確認できます）</h3>
      <div class="disaster-grid">
        <!-- 阪神淡路大震災 -->
        <div class="disaster-card">
          <h4>1995年 阪神・淡路大震災</h4>
          <ul>
            <li>
              <strong>発生日時</strong>
              1月17日 午前5時46分
            </li>
            <li>
              <strong>死者・行方不明者数</strong>
              <a href="https://www.mlit.go.jp/hakusyo/mlit/r02/hakusho/r03/html/n1122000.html" target="_blank" rel="noopener noreferrer">6,437人 (国土交通省)</a>
            </li>
            <li>
              <strong>多かった死因</strong>
              <a href="http://www.geje-gcds.jp/pdf/KokH22YV-1_J.pdf" target="_blank" rel="noopener noreferrer">圧迫死 (兵庫県医師会)</a>
            </li>
          </ul>
        </div>
      </div>
    </div>

    <div class="summary" id="summary">
      データを読み込み中です。
    </div>

    <div class="event-list">
      <h3 id="event-title">地震一覧</h3>
      <div id="event-table"></div>
    </div>

    <div class="note">
      ※ 「詳細不明」の地震は、座標や地域名から可能な範囲で都道府県に割り当てています。
    </div>
  </div>

  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <script src="../js/map1995.js"></script>
</body>
</html>
